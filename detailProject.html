<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        background: #f0f0ee;
        color: #1a1a1a;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 600;
        margin-right: 8px;
        background: #f5a623;
        color: #111;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <a href="addProjects.html" class="btn btn-outline-dark mb-4">
        <i class="bi bi-arrow-left me-2"></i>Back
      </a>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4 p-md-5">
          <h1 id="title" class="mb-3">Project Title</h1>

          <div class="mb-4" id="meta"></div>

          <p id="desc" class="fs-5 mb-4"></p>
        </div>
      </div>
    </main>

    <script>
      const STORAGE_KEY = "portfolioProjects";
      const SELECTED_KEY = "selectedProject";

      function safeParse(raw, fallback) {
        try {
          return JSON.parse(raw);
        } catch {
          return fallback;
        }
      }

      const selected = safeParse(
        localStorage.getItem(SELECTED_KEY) || "{}",
        {},
      );
      const allProjects = safeParse(
        localStorage.getItem(STORAGE_KEY) || "[]",
        [],
      );

      const latestProject =
        Array.isArray(allProjects) && allProjects.length
          ? allProjects[allProjects.length - 1]
          : {};
      const d = Object.keys(selected).length ? selected : latestProject;

      const titleValue = d.projectName || d.title || "Untitled Project";
      const descValue = d.description || d.desc || "No description available.";
      const categoryValue = d.category || d.tag || "Project";

      document.getElementById("title").textContent = titleValue;
      document.getElementById("desc").textContent = descValue;

      const createdDate = d.createdAt
        ? new Date(d.createdAt).toLocaleDateString("id-ID", {
            year: "numeric",
            month: "short",
            day: "numeric",
          })
        : d.year || "";

      const meta = document.getElementById("meta");
      const categoryTag = document.createElement("span");
      categoryTag.className = "tag";
      categoryTag.textContent = categoryValue;
      meta.appendChild(categoryTag);

      if (createdDate) {
        const dateTag = document.createElement("span");
        dateTag.className = "tag";
        dateTag.style.background = "rgba(0, 0, 0, 0.08)";
        dateTag.style.color = "#444";
        dateTag.innerHTML = `<i class="bi bi-calendar3 me-1"></i>${createdDate}`;
        meta.appendChild(dateTag);
      }
    </script>
  </body>
</html>
